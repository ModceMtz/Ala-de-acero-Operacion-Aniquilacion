<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ala de Acero</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Ala de Acero</span>
        <span id="score">Score: 0</span>

        <div style="width:200px; background:#333; margin-left:20px; position:relative;">
            <div id="lifeBar" style="height:20px; width:100%; background:lime;"></div>
            <span id="lifeText"
                style="position:absolute; width:100%; text-align:center; top:0; left:0; color:black; font-weight:bold;">
                100%
            </span>
        </div>
    </div>
</nav>

<div id="menu" class="menu-container">
    <h1>Ala de Acero</h1>
    <p>Operación Aniquilación</p>

    <div class="instructions">
        <p>- Mueve el mouse</p>
        <p>- Click para disparar</p>
    </div>

    <h4>Selecciona tu avión:</h4>
    <div class="skins">
        <img src="assets/img/skins/skin1.png" class="skin-option">
        <img src="assets/img/skins/skin2.png" class="skin-option">
        <img src="assets/img/skins/skin3.png" class="skin-option">
    </div>

    <button id="startBtn" class="btn btn-primary mt-3">Iniciar Juego</button>
</div>

<div class="container text-center mt-3">
    <canvas id="gameCanvas"></canvas>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>
